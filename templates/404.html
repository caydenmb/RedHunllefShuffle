<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>404 — Page Not Found</title>
  <style>
    :root{
      --bg:#0f0f0f; --fg:#eaeaea; --muted:#a8a8a8; --accent:#52ff33;
      --ring: color-mix(in oklab, var(--accent) 30%, transparent);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      display:grid;place-items:center;padding:24px;
      background:
        radial-gradient(900px 450px at 70% -10%, #1c1c1c 10%, transparent 60%),
        linear-gradient(135deg,#0f0f0f,#191919);
      color:var(--fg);
      font:16px/1.6 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      text-align:center;
    }
    main{max-width:720px}
    h1{font-weight:900;letter-spacing:-.02em;font-size:clamp(3rem,10vw,5.5rem);color:var(--accent)}
    p{margin:1rem 0 1.6rem;color:var(--muted);font-size:1.125rem}
    a{
      display:inline-block;padding:.9rem 1.6rem;border-radius:999px;background:var(--accent);
      color:#111;text-decoration:none;font-weight:800;
      box-shadow:0 10px 30px rgba(82,255,51,.18);transition:transform .15s ease, box-shadow .15s ease;
    }
    a:hover{transform:translateY(-2px)}
    a:focus-visible{outline:none;box-shadow:0 0 0 3px var(--ring),0 10px 30px rgba(82,255,51,.22)}
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>We couldn't find that page.</p>
    <a href="/">Return Home</a>
  </main>
</body>
</html>
