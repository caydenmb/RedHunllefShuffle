<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>404 — Page Not Found</title>
  <style>
    :root{
      --bg:#0f0f0f; --fg:#e8e8e8; --muted:#a1a1a1; --accent:#52ff33;
      --ring: color-mix(in oklab, var(--accent) 30%, transparent);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      display:grid;place-items:center;background:
        radial-gradient(1200px 600px at 80% -10%, #1e1e1e 10%, transparent 60%),
        linear-gradient(135deg,#0f0f0f,#1a1a1a);
      color:var(--fg); font: 16px/1.5 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      text-align:center; padding:24px;
    }
    main{max-width:680px}
    h1{font-weight:900;letter-spacing:-.02em;font-size:clamp(3rem,10vw,6rem);color:var(--accent)}
    p{margin:1rem 0 1.6rem;color:var(--muted);font-size:1.125rem}
    a{
      display:inline-block;padding:.9rem 1.6rem;border-radius:999px;background:var(--accent);
      color:#111;text-decoration:none;font-weight:800;box-shadow:0 8px 28px rgba(82,255,51,.18);
      transition:transform .15s ease, box-shadow .15s ease;
    }
    a:hover{transform:translateY(-2px)}
    a:focus-visible{outline:none;box-shadow:0 0 0 3px var(--ring),0 8px 28px rgba(82,255,51,.22)}
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>Looks like you got lost in the wager race.</p>
    <a href="/">Return Home</a>
  </main>
</body>
</html>
