<!-- templates/404.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>404 – Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Page not found" />
  <style>
    body { margin:0; padding:0; display:flex; align-items:center; justify-content:center;
      height:100vh; background:#0f0f0f; color:#e1e1e1; font-family:Arial,sans-serif; text-align:center; }
    h1 { font-size:4rem; margin-bottom:1rem; }
    p  { font-size:1.25rem; margin-bottom:1.5rem; color:#a1a1a1; }
    a  { padding:.8rem 1.6rem; background:#52ff33; color:#111; text-decoration:none; border-radius:999px;
         transition:transform .2s; font-weight:700; }
    a:hover { transform:translateY(-2px); }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>Oops! That page can’t be found.</p>
    <a href="/">Return Home</a>
  </div>
</body>
</html>
